<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأقسام والقنوات</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Cairo',sans-serif;background:#000;color:#fff;height:100%;}
.wrapper{width:100%;max-width:1100px;margin:auto;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;justify-items:center;}
.card{width:100px;background:#dcdcdc;border-radius:8px;overflow:hidden;text-align:center;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,0.08);transition:transform 0.2s;}
@media(hover:hover){.card:hover{transform:scale(1.05);}}
.card img{width:100px;height:100px;object-fit:cover;border-radius:6px;border:2px solid #ccc;display:block;margin:auto;}
.card-title{background:rgba(0,0,0,0.05);padding:3px 2px;font-size:12px;font-weight:700;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;}
.section{display:none;}
#playerPage{position:fixed;inset:0;background:#000;display:none;z-index:9999;}
#video{width:100%;height:100%;background:#000;}
</style>
</head>
<body>

<div class="wrapper" id="home">
  <div class="grid" id="sectionsGrid"></div>
</div>

<div id="playerPage">
  <video id="video" controls autoplay playsinline></video>
</div>

// =====================
// إنشاء واجهة الأقسام
const sectionsGrid = document.getElementById('sectionsGrid');
SECTIONS.forEach(sec=>{
  let div = document.createElement('div');
  div.className='card';
  div.innerHTML=`<img src="${sec.img}" alt="${sec.title}"><div class="card-title">${sec.title}</div>`;
  div.onclick=()=>showSection(sec.id);
  sectionsGrid.appendChild(div);
});

// =====================
// عرض قسم القنوات
let lastSectionId=null;
function showSection(id){
  lastSectionId=id;
  const section=SECTIONS.find(s=>s.id===id);
  sectionsGrid.innerHTML='';
  section.channels.forEach(ch=>{
    let div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<img src="${ch.img}" alt="${ch.title}"><div class="card-title">${ch.title}</div>`;
    div.onclick=()=>playChannel(ch.stream);
    sectionsGrid.appendChild(div);
  });
}

// =====================
// تشغيل القناة
const playerPage=document.getElementById('playerPage');
const video=document.getElementById('video');
let hls=null;
function playChannel(url){
  playerPage.style.display='block';
  if(Hls.isSupported()){
    if(hls){hls.destroy();}
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{video.play();});
  }else{video.src=url; video.play();}
}

// =====================
// الرجوع من الفيديو للقسم السابق
playerPage.onclick=()=>{
  playerPage.style.display='none';
  video.pause();
  showSection(lastSectionId);
}

// =====================
// الرجوع للماضي تلقائياً من الجهاز
window.onpopstate=()=>{
  if(playerPage.style.display==='block'){playerPage.style.display='none'; video.pause(); showSection(lastSectionId);}
}
</script>
