        const video = document.getElementById('video');

        let hls = null, isHQ = false, hideTimer = null, currentActiveCard = null;

        function killTimer() { if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; } }
        function startHideTimer() { killTimer(); hideTimer = setTimeout(() => { closeUI(); }, 5000); }
        function toggleUI(e) { menu.classList.contains('active') ? closeUI() : openUI(); }

        function openUI() {
            menu.classList.add('active');
            if (currentActiveCard) {
                currentActiveCard.focus();
                currentActiveCard.scrollIntoView({ block: "center" });
            } else { menu.focus(); }
            if (isHQ) qBtn.style.display = 'block';
        }

        function closeUI() {
            menu.classList.remove('active');
            qBtn.style.display = 'none';
            qMenu.style.display = 'none';
            killTimer();
        }

        menu.addEventListener('mouseenter', killTimer);
        menu.addEventListener('mousemove', killTimer);
        menu.addEventListener('wheel', killTimer);
        menu.addEventListener('mouseleave', () => { if (menu.classList.contains('active')) startHideTimer(); });

        // إدارة التحكم بالريموت
        document.addEventListener('keydown', (e) => {
            const isMenuOpen = menu.classList.contains('active');
            const isQOpen = qMenu.style.display === 'block';

            if (!isMenuOpen && !isQOpen) {
                if (["Enter", "ArrowUp", "ArrowDown", " "].includes(e.key)) openUI();
                return;
            }
            
            killTimer();

            // التحكم داخل قائمة الجودات
            if (isQOpen) {
                const qItems = Array.from(qMenu.querySelectorAll('.q-option'));

                if (e.key === "ArrowDown") { e.preventDefault(); (qItems[qIndex + 1] || qItems[0]).focus(); }
                else if (e.key === "ArrowUp") { e.preventDefault(); (qItems[qIndex - 1] || qItems[qItems.length - 1]).focus(); }
                else if (["Escape", "Back", "BrowserBack", "ArrowRight"].includes(e.key)) { 
                    e.preventDefault(); qMenu.style.display = 'none'; qBtn.focus(); 
                }

            // الانتقال لزر HQ بالريموت (سهم يسار)

                qBtn.focus();
                return;
            }

            // التحكم في القائمة الرئيسية
            const items = Array.from(document.querySelectorAll('.channel-card'));
            let index = items.indexOf(document.activeElement);

            if (e.key === "ArrowDown") { e.preventDefault(); (items[index + 1] || items[0]).focus(); }
            else if (e.key === "ArrowUp") { e.preventDefault(); (items[index - 1] || items[items.length - 1]).focus(); }

                document.getElementById('main').appendChild(ifr);
            } else {
                video.style.display = 'block';
                if (Hls.isSupported()) {
                    hls = new Hls({ enableWorker: true, maxBufferLength: 10 });
                    hls.loadSource(url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, (e, d) => {
                        if (d.levels.length > 1) {
                            isHQ = true;
                            if(menu.classList.contains('active')) qBtn.style.display = 'block';
                            buildQ(d.levels);
                        }
                        video.play().catch(()=>{});
                    });
                } else { video.src = url; video.play().catch(()=>{}); }
            }
        }

        function buildQ(lvls) {
            qMenu.innerHTML = '';
            const opts = [{name: 'تلقائي', id: -1}, ...lvls.map((l, i) => ({name: l.height + 'p', id: i}))];
            opts.forEach(opt => {
                const o = document.createElement('div');
                o.className = 'q-option';
                o.tabIndex = 0;
                o.innerText = opt.name;
                const selectFn = (e) => {
                    e.stopPropagation();
                    hls.currentLevel = opt.id;
                    qMenu.style.display = 'none';
                    startHideTimer();
                };
                o.onclick = selectFn;
                o.onkeydown = (e) => { if(e.key === "Enter") selectFn(e); };
                qMenu.appendChild(o);
            });
        }

        // دالة فتح/غلق قائمة الجودة مع دعم الريموت
        function toggleQMenu() {
            const isVisible = qMenu.style.display === 'block';
            qMenu.style.display = isVisible ? 'none' : 'block'; 
            if (!isVisible) {
                const firstOpt = qMenu.querySelector('.q-option');
                if(firstOpt) firstOpt.focus();
            }
            killTimer();
        }

        qBtn.onclick = (e) => { e.stopPropagation(); toggleQMenu(); };
        
        // إصلاح ضغطة الريموت على زر HQ
        qBtn.onkeydown = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                toggleQMenu();
            }
        };

        const listDiv = document.getElementById('list');
        const items = rawChannels.trim().split('\n').filter(x => x.trim());
        for (let i = 0; i < items.length; i += 2) {
            const card = document.createElement('div');
            card.className = 'channel-card'; card.tabIndex = 0;
            card.innerHTML = `<span class="ch-num">${(i/2)+1}</span><span class="ch-name">${items[i]}</span>`;
            card.onclick = (e) => { e.stopPropagation(); play(items[i+1], card); };
            card.onkeydown = (e) => { if(e.key === "Enter") play(items[i+1], card); };
            listDiv.appendChild(card);
            if (i === 0) { play(items[i+1], card); currentActiveCard = card; }
        }
        window.onload = () => { openUI(); };
    </script>
</body>
</html>
