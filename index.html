<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الفاهم للصيانة - طلب صيانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #FFC107;
            --dark: #121212;
            --gray: #f8f9fa;
            --success: #28a745;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: #ebedef; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .hero {
            background: var(--dark);
            color: var(--primary);
            padding: 25px;
            text-align: center;
        }

        .hero i { font-size: 35px; margin-bottom: 10px; }
        .hero h1 { font-size: 20px; color: #fff; }

        .content { padding: 20px; }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            background: var(--gray);
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: var(--primary); background: #fff; }

        .map-container {
            background: #fff9e6;
            border: 2px dashed var(--primary);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .map-container.active {
            border-style: solid;
            border-color: var(--success);
            background: #f4fff6;
        }

        .map-container i { font-size: 24px; color: var(--dark); }
        .map-container p { font-size: 13px; font-weight: bold; margin-top: 5px; }

        .btn-submit {
            background: var(--dark);
            color: var(--primary);
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .footer-text { text-align: center; font-size: 10px; color: #bbb; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="hero">
        <i class="fas fa-tools"></i>
        <h1>مركز الصيانة الاحترافي</h1>
    </div>

    <div class="content">
        <form id="orderFormV3">
            <div class="section-title">بيانات الزبون</div>
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="u_name" placeholder="أدخل اسمك هنا" required>
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="u_phone" placeholder="07XXXXXXXX" required>
            </div>

            <div class="section-title">تفاصيل الجهاز</div>
            <div class="form-group">
                <label>نوع الجهاز</label>
                <select id="u_device">
                    <option value="آيفون">iPhone</option>
                    <option value="سامسونج">Samsung</option>
                    <option value="شاومي">Xiaomi</option>
                    <option value="بلاي ستيشن">PlayStation</option>
                    <option value="أخرى">أخرى</option>
                </select>
            </div>
            <div class="form-group">
                <label>وصف العطل</label>
                <textarea id="u_issue" rows="2" placeholder="ما هي مشكلة الجهاز؟" required></textarea>
            </div>

            <div class="section-title">الموقع</div>
            <div class="map-container" id="gpsBox" onclick="fetchGPS()">
                <i class="fas fa-map-marker-alt"></i>
                <p id="gpsLabel">تحديد الموقع (GPS)</p>
            </div>
            
            <div class="form-group">
                <label>العنوان يدوياً</label>
                <input type="text" id="u_address" placeholder="المحافظة - الحي - أقرب نقطة دالة">
            </div>

            <input type="hidden" id="gpsLinkValue">

            <button type="submit" class="btn-submit">
                إرسال الطلب <i class="fab fa-whatsapp"></i>
            </button>
        </form>
        <p class="footer-text">نظام حجز صيانة - جميع الحقوق محفوظة</p>
    </div>
</div>

<script>
    function fetchGPS() {
        const label = document.getElementById('gpsLabel');
        const box = document.getElementById('gpsBox');
        const hiddenInput = document.getElementById('gpsLinkValue');

        label.innerHTML = "جاري التحديد...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                hiddenInput.value = `https://www.google.com/maps?q=${lat},${lon}`;
                label.innerHTML = "تم حفظ الموقع ✓";
                box.classList.add('active');
            }, function() {
                alert("يرجى تفعيل الموقع. سنفتح الخرائط لتختار موقعك.");
                window.open("https://www.google.com/maps", "_blank");
                label.innerHTML = "يرجى كتابة العنوان بالأسفل";
            }, { enableHighAccuracy: true });
        }
    }

    document.getElementById('orderFormV3').onsubmit = function(e) {
        e.preventDefault();
        
        // جلب الوقت والتاريخ الحالي
        const now = new Date();
        const dateStr = now.toLocaleDateString('ar-EG'); 
        const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

        const name = document.getElementById('u_name').value;
        const phone = document.getElementById('u_phone').value;
        const device = document.getElementById('u_device').value;
        const issue = document.getElementById('u_issue').value;
        const address = document.getElementById('u_address').value;
        const map = document.getElementById('gpsLinkValue').value;

        const whatsappNum = "9647722353355"; 

        // بناء الرسالة المطلوبة
        let msg = `*طلب صيانة جديد* 🛠️%0A`;
        msg += `*التاريخ:* ${dateStr}%0A`;
        msg += `*الساعة:* ${timeStr}%0A`;
        msg += `--------------------------%0A`;
        msg += `👤 *الزبون:* ${name}%0A`;
        msg += `📞 *الهاتف:* ${phone}%0A`;
        msg += `📱 *الجهاز:* ${device}%0A`;
        msg += `⚠️ *العطل:* ${issue}%0A`;
        msg += `📍 *العنوان:* ${address || "محدد في الخريطة"}%0A`;
        
        if(map) {
            msg += `%0A🗺️ *رابط الموقع:*%0A${map}`;
        }

        window.location.href = `https://api.whatsapp.com/send?phone=${whatsappNum}&text=${msg}`;
    };
</script>

</body>
</html>
