<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Tak</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .g-btn { background: white; color: black; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        .top-nav { position: absolute; top: 25px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; font-weight: bold; }
        .swiper { width: 100%; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .add-btn { background: linear-gradient(to right, #25f4ee, #fe2c55); padding: 4px 15px; border-radius: 8px; color: black; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 50px; margin-bottom: 30px;">Tik Tak</h1>
        <button class="g-btn" id="loginBtn">المتابعة باستخدام Google</button>
    </div>

    <div class="top-nav"><span>اتابعه</span> | <span style="border-bottom: 2px solid white;">لك</span> | <span>استكشف</span></div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="video-feed"></div>
    </div>

    <div class="bottom-nav">
        <div>🏠</div><div>👥</div>
        <div onclick="document.getElementById('upload').click()"><span class="add-btn">+</span></div>
        <div>💬</div><div>👤</div>
    </div>

    <input type="file" id="upload" hidden accept="video/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANGnbMj4S6xS5Xkl7dSIqTXwqYloy55Mw",
            authDomain: "tik-tak-c072a.firebaseapp.com",
            databaseURL: "https://alfaham-app-default-rtdb.firebaseio.com/",
            projectId: "tik-tak-c072a",
            storageBucket: "tik-tak-c072a.firebasestorage.app",
            appId: "1:345131210299:web:6acd8e3198b0238f84ee1e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // تعديل: استخدام Redirect بدلاً من Popup لحل مشكلة المربع الأبيض
        document.getElementById('loginBtn').onclick = () => {
            const provider = new GoogleAuthProvider();
            signInWithRedirect(auth, provider);
        };

        // فحص نتيجة تسجيل الدخول بعد العودة للصفحة
        getRedirectResult(auth).catch((error) => {
            console.error("خطأ في الدخول:", error);
        });

        onAuthStateChanged(auth, user => {
            if(user) document.getElementById('login-screen').style.display = 'none';
        });

        onValue(ref(db, 'videos'), snap => {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';
            snap.forEach(child => {
                const v = child.val();
                feed.insertAdjacentHTML('afterbegin', `
                    <div class="swiper-slide">
                        <video src="${v.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                    </div>`);
            });
            new Swiper(".mySwiper", { direction: "vertical" });
        });

        document.getElementById('upload').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            alert("جاري الرفع...");
            const fileRef = sRef(storage, 'v/' + Date.now());
            await uploadBytes(fileRef, file);
            const url = await getDownloadURL(fileRef);
            await set(push(ref(db, 'videos')), { url: url, userName: auth.currentUser.displayName });
            alert("تم النشر!");
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</body>
</html>
