<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Tak - Alfaham</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root { --main: #fe2c55; --sub: #25f4ee; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        .top-nav { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 1000; font-weight: bold; text-shadow: 1px 1px 3px #000; }
        .tab { cursor: pointer; opacity: 0.6; }
        .tab.active { opacity: 1; border-bottom: 3px solid white; }

        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { position: relative; width: 100%; height: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .side-bar { position: absolute; right: 12px; bottom: 130px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 100; }
        .icon-btn { font-size: 32px; cursor: pointer; text-align: center; text-shadow: 0 0 5px #000; }
        .icon-btn span { font-size: 13px; display: block; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000; }
        .plus-btn { background: linear-gradient(to right, var(--sub), var(--main)); padding: 4px 20px; border-radius: 10px; color: black; font-weight: bold; font-size: 28px; cursor: pointer; }
        
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; color: var(--sub); }
    </style>
</head>
<body>

    <div id="loader">جاري تشغيل تيك تاك... 🎬</div>

    <div class="top-nav">
        <div class="tab">اتابعه</div>
        <div class="tab active">لك</div>
        <div class="tab">استكشف</div>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="feed"></div>
    </div>

    <div class="bottom-nav">
        <div onclick="location.reload()">🏠</div>
        <div>👥</div>
        <div onclick="document.getElementById('camera').click()"><span class="plus-btn">+</span></div>
        <div>💬</div>
        <div>👤</div>
    </div>

    <input type="file" id="camera" hidden accept="video/*" capture="camcorder">

    <script>
        var config = {
            apiKey: "AIzaSyANGnbMj4S6xS5Xkl7dSIqTXwqYloy55Mw",
            authDomain: "tik-tak-cdfad.firebaseapp.com",
            databaseURL: "https://tik-tak-cdfad-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "tik-tak-cdfad",
            storageBucket: "tik-tak-cdfad.firebasestorage.app"
        };
        firebase.initializeApp(config);
        var db = firebase.database();
        var st = firebase.storage();

        db.ref('videos').on('value', function(snap) {
            var feed = document.getElementById('feed');
            if (snap.exists()) {
                document.getElementById('loader').style.display = 'none';
                var content = '';
                snap.forEach(function(child) {
                    var v = child.val();
                    content += `
                        <div class="swiper-slide">
                            <video src="${v.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                            <div class="side-bar">
                                <div class="icon-btn" onclick="this.style.color='#fe2c55'">❤️<span>0</span></div>
                                <div class="icon-btn">💬<span>0</span></div>
                                <div class="icon-btn">🔗</div>
                            </div>
                            <div style="position:absolute; bottom:90px; left:15px; font-weight:bold;">@${v.user || 'حيدر_الفاهم'}</div>
                        </div>`;
                });
                feed.innerHTML = content;
                new Swiper(".mySwiper", { direction: "vertical" });
            } else {
                document.getElementById('loader').innerText = "ارفع فيديو الآن!";
            }
        });

        document.getElementById('camera').onchange = function(e) {
            var file = e.target.files[0];
            if(!file) return;
            alert("بدأ الرفع.. انتظر قليلاً ✅");
            var ref = st.ref().child('v/' + Date.now());
            ref.put(file).then(function(s) {
                return s.ref.getDownloadURL();
            }).then(function(url) {
                db.ref('videos').push({ url: url, user: "Haider" });
                alert("تم النشر!");
                location.reload();
            });
        };
    </script>
</body>
</html>
