<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfaham Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* التنسيقات العامة */
        body { 
            font-family: 'Cairo', sans-serif !important; 
            background: #f4f4f4; 
            margin: 0; 
            padding: 0; 
        }

        /* الهيدر باللون الأسود وبدون ظل */
        .header-text {
            background: #000000;
            padding: 20px; 
            text-align: center;
            box-shadow: none; /* إزالة الظل تماماً */
            margin-bottom: 30px;
        }

        /* تكبير الشعار بشكل أكبر */
        .header-text img {
            max-height: 140px; /* تم تكبير الحجم */
            width: auto;
            display: inline-block;
        }

        /* حاوية الكروت */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px 40px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 5; 
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
            background: #fff;
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill;
        }

        /* تحسينات الموبايل */
        @media (max-width: 480px) {
            .header-text { padding: 15px; }
            .header-text img { max-height: 85px; } /* تعديل للموبايل */
            .card-container { gap: 15px; padding: 0 15px; }
        }
    </style>
</head>
<body>

    <header class="header-text">
        <img src="https://b.top4top.io/p_3725z11nv0.png" alt="Alfaham Store Logo">
    </header>

    <div class="card-container">
        
        <a href="https://alfahamtv.apk.com" class="card">
            <img src="https://raw.githubusercontent.com/h-80/img/refs/heads/main/Apk%20(1).png" alt="Alfaham tv">
        </a>
        <a href="https://tvkidstv.apk.com" class="card">
            <img src="https://raw.githubusercontent.com/h-80/img/refs/heads/main/Apk%20(3).png" alt="KIDS TV">
        </a>
        <a href="https://alfahamtube.apk.com" class="card">
            <img src="https://raw.githubusercontent.com/h-80/img/refs/heads/main/Apk%20(5).png" alt="Alfaham Tube">
        </a>
        <a href="https://alfahamsat.apk.com" class="card">
            <img src="https://raw.githubusercontent.com/h-80/img/refs/heads/main/Apk%20(6).png" alt="Alfaham Sat">
        </a>
        <a href="https://www.mediafire.com/file/yql6xdeykbuuzqk/Alfaham_Box.apk/file" class="card">
            <img src="https://raw.githubusercontent.com/h-80/img/refs/heads/main/Apk%20(7).png" alt="Alfaham Box">
        </a>
        <a href="https://alfahamlive.apk.com" class="card">
            <img src="https://raw.githubusercontent.com/h-80/img/refs/heads/main/Apk%20(4).png" alt="Alfaham Live">
        </a>
        <a href="https://www.mediafire.com/file/0x07dra2p2qjveo/Alfaham_Store.apk/file" class="card">
            <img src="https://raw.githubusercontent.com/h-80/img/refs/heads/main/Apk%20(2).png" alt="Alfaham Store">
        </a>

    </div>

</body>
</html>
