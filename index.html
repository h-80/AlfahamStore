    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:black;font-family:'Cairo',sans-serif;color:white;height:100vh;display:flex;overflow:hidden;}
        
        .player-container{width: 85%;height: 100vh;background:black;position:relative;flex-shrink:0;order: 2;}
        video, #youtubeIframe{width:100%;height:100%;background:black;outline:none;border:none;}
        
        .channels-container{background:#1a1a1a;width: 15%;height: 100vh;padding:6px;overflow-y:auto;order: 1;}
        .channels-grid{display:flex;flex-direction:column;gap:3px;}
        
        .channel-card{background:#2a2a2a;border-radius:4px;padding:4px 8px;cursor:pointer;border:2px solid transparent;color:white;font-size:13px;text-align:right;display:flex;align-items:center;gap:6px;line-height:1.3;min-height:32px; outline: none;}
        .channel-card:focus {border: 2px solid #e74c3c; background: #3a3a3a;}
        
        .channel-number{display:inline-flex;align-items:center;justify-content:center;background:#444;color:#fff;font-size:11px;font-weight:600;width:20px;height:20px;border-radius:3px;flex-shrink:0;}
        .channel-card.active{border-right:3px solid white;background:#3a3a3a;}
        .channel-card.active .channel-number{background:#e74c3c;color:white;}
        .channel-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

        .quality-hq-btn {position: absolute;bottom: 60px;right: 10px;background: rgba(0,0,0,0.4);color: white;border: 1px solid rgba(255,255,255,0.15);border-radius: 4px;padding: 4px 10px;font-size: 12px;cursor: pointer;z-index: 1000;display: none;transition: opacity 0.3s;}
        .quality-hq-btn:focus {border: 2px solid #e74c3c;}
        
        .quality-dropdown {position: absolute;bottom: 95px;right: 10px;background: rgba(0,0,0,0.9);border: 1px solid #444;border-radius: 4px;display: none;z-index: 1001;min-width: 90px;}
        .quality-item {padding: 8px 12px;cursor: pointer;font-size: 13px;text-align: right;border-bottom: 1px solid #333;display: flex;align-items: center;gap: 8px; outline: none;}
        .quality-item:focus {background: #e74c3c; color: white;}
        .dot {width: 6px;height: 6px;background: #e74c3c;border-radius: 50%;display: none;flex-shrink: 0;}
        .quality-item.active .dot {display: block;}

        @media (max-width: 768px) {
            body {flex-direction: column;}
            .player-container {width: 100%;height: 65vh;order: 2;}
            .channels-container {width: 100%;height: 35vh;order: 1;}
        }
    </style>
</head>

        const video = document.getElementById('video');
        const list = document.getElementById('channelsList');
        const qualityBtn = document.getElementById('qualityHqBtn');
        const qualityDropdown = document.getElementById('qualityDropdown');
        const playerContainer = document.getElementById('playerContainer');
        let hls = null;

        function playChannel(url, card) {
            if (hls) { hls.destroy(); hls = null; }
            qualityDropdown.style.display = 'none';
            qualityBtn.style.display = 'none';
            const oldIframe = document.getElementById('youtubeIframe');
            if (oldIframe) oldIframe.remove();

            document.querySelectorAll('.channel-card').forEach(e => e.classList.remove('active'));
            card.classList.add('active');

            if (url.includes('youtube.com') || url.includes('embed/')) {
                video.style.display = 'none';
                const iframe = document.createElement('iframe');
                iframe.id = 'youtubeIframe';
                iframe.src = url.includes('embed/') ? url : `https://www.youtube.com/embed/${url.split('v=')[1]?.split('&')[0]}?autoplay=1`;
                iframe.allow = "autoplay; fullscreen";
                playerContainer.appendChild(iframe);
            } else {
                video.style.display = 'block';
                if (Hls.isSupported() && url.includes('.m3u8')) {
                    hls = new Hls({xhrSetup: (xhr) => {xhr.setRequestHeader('Referer', 'https://www.google.com/');}});
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
                        if (data.levels.length > 1) {
                            qualityBtn.style.display = 'block';
                            updateQualityMenu(hls, hls.currentLevel);
                        }
                        video.play().catch(()=>{});
                    });
                } else { video.src = url; video.play().catch(()=>{}); }
            }
        }

        function updateQualityMenu(hlsInstance, selectedIndex) {
            qualityDropdown.innerHTML = '';
            hlsInstance.levels.forEach((level, index) => {
                const opt = document.createElement('div');
                opt.className = 'quality-item' + (index === selectedIndex ? ' active' : '');
                opt.tabIndex = "0";
                opt.innerHTML = `<span class="dot"></span> ${level.height}p`;
                opt.onclick = () => {
                    hlsInstance.currentLevel = index;
                    updateQualityMenu(hlsInstance, index);
                    qualityDropdown.style.display = 'none';
                };
                opt.onkeydown = (e) => { if(e.key === 'Enter') opt.click(); };
                qualityDropdown.appendChild(opt);
            });
        }

        qualityBtn.onclick = () => { qualityDropdown.style.display = (qualityDropdown.style.display === 'block') ? 'none' : 'block'; };

        // بناء القائمة من البيانات
        const lines = rawChannels.trim().split('\n').filter(l => l.trim() !== "");
        for (let i = 0; i < lines.length; i += 2) {
            const name = lines[i].trim();
            const url = lines[i+1]?.trim();
            if (name && url) {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.tabIndex = "0";
                card.innerHTML = `<span class="channel-number">${(i/2) + 1}</span><span class="channel-name">${name}</span>`;
                card.onclick = () => playChannel(url, card);
                card.onkeydown = (e) => { if(e.key === 'Enter') card.click(); };
                list.appendChild(card);
                if (i === 0) card.click();
            }
        }
    </script>
