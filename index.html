<title>الأقسام والقنوات</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Cairo',sans-serif;background:#000;color:#000;}
.wrapper{width:100%;max-width:1100px;margin:auto;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;justify-items:center;}
.card{
  width:100px;
  background:#dcdcdc;
  border-radius:8px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,0.08);
  transition:transform 0.2s;
}
@media(hover:hover){.card:hover{transform:scale(1.05);}}
.card img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:6px;
  border:2px solid #ccc;
  display:block;
  margin:auto;
}
.card-title{
  background:rgba(0,0,0,0.05);
  padding:3px 2px;
  font-size:12px;
  font-weight:700;
  color:#000;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-align:center;
}
.section{display:none;}
#playerPage{position:fixed;inset:0;background:#000;display:none;z-index:9999;}
#video{width:100%;height:100%;background:#000;}
</style>
</head>
<body>

<!-- الواجهة الرئيسية -->
<div class="wrapper" id="home">
  <div class="grid" id="sectionsGrid"></div>
</div>

<!-- مشغل HLS -->
<div id="playerPage">
  <video id="video" controls autoplay playsinline></video>
</div>

/* ======================= */
/* توليد واجهة الأقسام */
const sectionsGrid=document.getElementById("sectionsGrid");
SECTIONS.forEach(section=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<img src="${section.img}"><div class="card-title">${section.title}</div>`;
  div.addEventListener("click",()=>{ showSection(section.id); history.pushState({section:section.id},""); });
  sectionsGrid.appendChild(div);
});

/* ======================= */
/* توليد صفحات الأقسام والقنوات */
function showSection(id){
  const section=SECTIONS.find(s=>s.id===id);
  if(!section) return;
  let secDiv=document.getElementById(id);
  if(!secDiv){
    secDiv=document.createElement("div");
    secDiv.id=id;
    secDiv.className="wrapper section";
    secDiv.innerHTML=`<h2 style="text-align:center;margin-bottom:10px;color:#fff">${section.title}</h2><div class="grid" style="margin-top:0;"></div>`;
    document.body.appendChild(secDiv);
    const grid=secDiv.querySelector(".grid");
    section.channels.forEach(ch=>{
      const chDiv=document.createElement("div");
      chDiv.className="card";
      chDiv.innerHTML=`<img src="${ch.img}"><div class="card-title">${ch.title}</div>`;
      chDiv.addEventListener("click",()=>{ playStream(ch.stream,id); });
      grid.appendChild(chDiv);
    });
  }
  document.getElementById("home").style.display="none";
  document.querySelectorAll(".section").forEach(s=>s!==secDiv?s.style.display="none":null);
  secDiv.style.display="block";
}

/* ======================= */
/* مشغل البث */
const playerPage=document.getElementById("playerPage");
const video=document.getElementById("video");
let currentSection=null;
function playStream(url,sectionId){
  currentSection=sectionId;
  playerPage.style.display="block";
  if(Hls.isSupported()){
    const hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    video.play();
  }else{video.src=url;video.play();}
}

/* ======================= */
/* زر العودة بالجهاز */
window.onpopstate=(event)=>{
  playerPage.style.display="none"; video.pause(); video.src="";
  if(currentSection){ showSection(currentSection); currentSection=null; return; }
  if(event.state && event.state.section){ showSection(event.state.section); }
  else{ document.getElementById("home").style.display="block"; document.querySelectorAll(".section").forEach(s=>s.style.display="none"); }
};
