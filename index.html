<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Tak - تيك تاك</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --main: #fe2c55; --sub: #25f4ee; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .g-btn { background: white; color: black; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }

        /* التبويبات العلوية */
        .top-nav { position: absolute; top: 25px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        .active-tab { border-bottom: 2px solid white; }

        /* مشغل الفيديو */
        .swiper { width: 100%; height: 100vh; }
        .video-wrapper { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* أزرار التفاعل الجانبية */
        .side-bar { position: absolute; right: 10px; bottom: 110px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 50; }
        .icon { text-align: center; font-size: 28px; cursor: pointer; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .icon span { font-size: 12px; display: block; }
        .user-pic { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; }

        /* معلومات الفيديو */
        .v-info { position: absolute; bottom: 80px; left: 15px; z-index: 50; max-width: 70%; text-shadow: 1px 1px 3px rgba(0,0,0,1); }
        .v-user { font-weight: bold; font-size: 17px; margin-bottom: 5px; display: block; }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; z-index: 100; }
        .nav-item { font-size: 11px; text-align: center; color: #888; cursor: pointer; }
        .add-btn { background: linear-gradient(to right, var(--sub), var(--main)); padding: 4px 15px; border-radius: 8px; color: black; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 50px; margin-bottom: 30px;">Tik Tak</h1>
        <button class="g-btn" id="loginBtn">المتابعة باستخدام Google</button>
    </div>

    <div class="top-nav">
        <span>اتابعه</span>
        <span class="active-tab">لك</span>
        <span>استكشف</span>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="video-feed">
            </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" style="color:white">🏠<br>الرئيسية</div>
        <div class="nav-item">👥<br>الأصدقاء</div>
        <div class="nav-item" onclick="document.getElementById('upload').click()">
            <span class="add-btn">+</span>
        </div>
        <div class="nav-item">💬<br>الوارد</div>
        <div class="nav-item" onclick="alert('الملف الشخصي سيظهر هنا')">👤<br>الملف</div>
    </div>

    <input type="file" id="upload" hidden accept="video/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // إعدادات Firebase الخاصة بك (قاعدة بيانات الفاهم)
        const firebaseConfig = {
            apiKey: "AIzaSyANGnbMj4S6xS5Xkl7dSIqTXwqYloy55Mw",
            authDomain: "tik-tak-c072a.firebaseapp.com",
            databaseURL: "https://alfaham-app-default-rtdb.firebaseio.com/",
            projectId: "tik-tak-c072a",
            storageBucket: "tik-tak-c072a.firebasestorage.app",
            appId: "1:345131210299:web:6acd8e3198b0238f84ee1e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // تسجيل الدخول
        document.getElementById('loginBtn').onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).then(() => {
                document.getElementById('login-screen').style.display = 'none';
            });
        };

        onAuthStateChanged(auth, user => {
            if(user) document.getElementById('login-screen').style.display = 'none';
        });

        // جلب الفيديوهات لحظياً من قاعدة البيانات
        onValue(ref(db, 'videos'), snap => {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';
            snap.forEach(child => {
                const v = child.val();
                feed.insertAdjacentHTML('afterbegin', `
                    <div class="swiper-slide">
                        <div class="video-wrapper">
                            <video src="${v.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                            <div class="side-bar">
                                <img src="${v.userPhoto || 'https://via.placeholder.com/50'}" class="user-pic">
                                <div class="icon">❤️<span>0</span></div>
                                <div class="icon">💬<span>0</span></div>
                                <div class="icon">🔗<span>شارك</span></div>
                            </div>
                            <div class="v-info">
                                <span class="v-user">@${v.userName}</span>
                                <div>مقطع جديد على تيك تاك 🎬</div>
                            </div>
                        </div>
                    </div>`);
            });
            new Swiper(".mySwiper", { direction: "vertical" });
        });

        // رفع فيديو جديد
        document.getElementById('upload').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            alert("بدأ الرفع إلى قاعدة بيانات تيك تاك...");
            const fileRef = sRef(storage, 'tiktak/' + Date.now());
            await uploadBytes(fileRef, file);
            const url = await getDownloadURL(fileRef);
            
            const newVideo = push(ref(db, 'videos'));
            await set(newVideo, {
                url: url,
                userName: auth.currentUser.displayName,
                userPhoto: auth.currentUser.photoURL,
                userId: auth.currentUser.uid,
                time: Date.now()
            });
            alert("تم النشر بنجاح! اسحب للتحديث.");
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</body>
</html>
