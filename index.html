        body{background:black;font-family:'Cairo',sans-serif;color:white;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
        .player-container{width:100%;background:black;flex-shrink:0;aspect-ratio:16/9;position:relative;}

        .channel-number{display:inline-flex;align-items:center;justify-content:center;background:#444;color:#fff;font-size:12px;font-weight:600;width:22px;height:22px;border-radius:4px;flex-shrink:0;}

        .channel-card.active{border-right:3px solid white;background:#3a3a3a;}
        .channel-card.active .channel-number{background:#e74c3c;}
        .channel-name{flex:1;}

        .quality-hq-btn {position: absolute;bottom: 65px;right: 10px;background: rgba(0,0,0,0.4);color: white;border: 1px solid rgba(255,255,255,0.1);border-radius: 4px;padding: 5px 12px;font-size: 12px;cursor: pointer;z-index: 1000;display: none;transition: opacity 0.3s;}
        
        #qualityMenu {position: absolute;bottom: 65px;right: 65px;background: rgba(0,0,0,0.7);border: 1px solid rgba(255,255,255,0.1);border-radius: 4px;display: none;z-index: 1000;min-width: 70px;}
        .quality-option {padding: 8px 12px;cursor: pointer;font-size: 12px;text-align: center;border-bottom: 1px solid rgba(255,255,255,0.1);display: flex;align-items: center;justify-content: center;gap: 5px;}
        .quality-option:hover {background: rgba(255,255,255,0.2);}
        
        .dot {width: 6px;height: 6px;background: #e74c3c;border-radius: 50%;display: none;}
        .quality-option.selected .dot {display: block;}
    </style>

        function playChannel(url, card) {

            qualityBtn.style.display = 'none';
            const existingIframe = document.getElementById('youtubeIframe');

            const youtubeID = getYouTubeID(url);

            if (youtubeID) {

                        video.play().catch(()=>{});
